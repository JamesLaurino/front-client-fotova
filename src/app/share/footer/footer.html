<footer class="footer-fotova text-white mt-auto">
  <div class="footer-accent"></div>
  <div class="container py-4">
    <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
      <p class="mb-0 small footer-copy">
        &copy; {{ getDate() | date:'yyyy' }} <span class="footer-brand">Fotova-Creation</span>
        <span class="footer-sep d-none d-md-inline">·</span>
        <span class="footer-tagline d-none d-md-inline">
          {{ i18n.getTranslation('COPYRIGHT') }}
        </span>
      </p>
      <div class="d-flex gap-2 footer-socials">
        <a href="https://www.facebook.com" target="_blank" rel="noopener" aria-label="Facebook" class="footer-social">
          <i class="bi bi-facebook"></i>
        </a>
        <a href="https://www.linkedin.com" target="_blank" rel="noopener" aria-label="LinkedIn" class="footer-social">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://www.twitter.com" target="_blank" rel="noopener" aria-label="Twitter" class="footer-social">
          <i class="bi bi-twitter"></i>
        </a>
        <a href="https://www.instagram.com" target="_blank" rel="noopener" aria-label="Instagram" class="footer-social">
          <i class="bi bi-instagram"></i>
        </a>
      </div>
    </div>
  </div>
</footer>
