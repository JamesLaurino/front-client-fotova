<div class="create-section">

  <!-- Header -->
  <div class="section-header">
    <div class="section-title">
      <i class="bi bi-tag"></i>
      <span>{{ i18n.getTranslation("CATEGORY") }}</span>
    </div>
  </div>

  <!-- Form body -->
  <div class="form-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="field-group">
        <label for="inputName" class="form-label-custom">
          {{ i18n.getTranslation("NAME") }}
        </label>
        <input
          type="text"
          formControlName="name"
          class="form-input"
          id="inputName"
          placeholder="{{ i18n.getTranslation('CATEGORY') }}"
        />
        <div class="error-slot">
          @if (name.hasError('required') && name.touched) {
            <span class="field-error">{{ i18n.getTranslation("PLEASE_ENTER_CATEGORY_NAME") }}</span>
          }
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="hideForm()">
          <i class="bi bi-x"></i>
          {{ i18n.getTranslation("HIDE") }}
        </button>
        <button type="submit" class="btn-save" [disabled]="form.invalid">
          <i class="bi bi-check-lg"></i>
          {{ i18n.getTranslation("SAVE") }}
        </button>
      </div>

    </form>
  </div>

</div>
