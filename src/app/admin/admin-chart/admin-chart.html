<div class="chart-wrapper">
  <div class="chart-header">
    <h3>{{ i18n.getTranslation('STATISTICS') }}</h3>
  </div>
  <div class="chart-container">
    <canvas baseChart
            [data]="barChartData"
            [options]="barChartOptions"
            [type]="barChartType">
    </canvas>
  </div>
</div>
