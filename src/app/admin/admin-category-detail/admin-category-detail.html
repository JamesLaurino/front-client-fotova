<div class="page-center">
  <div class="category-detail-section">

    <!-- Header -->
    <div class="section-header">
      <div class="section-title">
        <i class="bi bi-tag"></i>
        <span>{{ i18n.getTranslation("EDIT") }} {{ i18n.getTranslation("CATEGORY") }}</span>
      </div>
      <button type="button" class="btn-back" (click)="backToPanel()">
        <i class="bi bi-arrow-left"></i>
        {{ i18n.getTranslation("BACK_TO_PANEL") }}
      </button>
    </div>

    <!-- Body -->
    <div class="section-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- ID -->
        <div class="field-row">
          <span class="field-label">ID</span>
          <div class="id-badge">#{{ form.get('id')?.value }}</div>
        </div>

        <!-- Name -->
        <div class="field-row">
          <label for="inputName" class="field-label">
            {{ i18n.getTranslation("NAME") }}
          </label>
          <input
            type="text"
            formControlName="name"
            class="field-input"
            id="inputName"
            [class.field-input--error]="name.hasError('required') && name.touched">
          <div class="error-slot">
            @if (name.hasError('required') && name.touched) {
              <small class="error-msg">{{ i18n.getTranslation("ENTER_CATEGORY_NAME") }}</small>
            }
          </div>
        </div>

        <!-- Footer -->
        <div class="section-footer">
          <button
            type="submit"
            class="btn-save"
            [disabled]="form.invalid">
            <i class="bi bi-check-circle"></i>
            {{ i18n.getTranslation("SAVE") }}
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
